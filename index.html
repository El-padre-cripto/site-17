<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>L7 System</title>
  <style>
    body {
      background-color: black;
      color: #00ff88;
      font-family: monospace;
      display: flex;
      justify-content: center;

      height: 100vh;
      flex-direction: column;
    }

    .box {
      border: 1px solid #00ff88;
      padding: 20px;
      text-align: center;
      width: 300px;
    }

    .glow {
      text-shadow: 0 0 10px #00ff88;
    }
  </style>
</head>

<body>
  <div class="box">
    <p class="glow">// L7 CORE SYSTEM //</p>
    <p>init: LINDUXA</p>
    <p>state: LOVE_OVERFLOW</p>
    <br>
    <p class="glow">Te amo muito, LINDUXA</p>
  </div>
</body>
</html>
